// ═══════════════════════════════
// EVENTS
// ═══════════════════════════════
function attachEvents() {
  // Onboarding — loading screen message cycling (step 21)
  if (S.screen === 'onboarding' && S.onboard.step === 21) {
    const msgs = ['Analysing your goal...','Matching workout library...','Calibrating difficulty...','Scheduling your week...','Building your plan...'];
    let mi = 0;
    const msgEl = $('load-msg');
    const msgT = setInterval(() => {
      mi++;
      if (mi >= msgs.length) { clearInterval(msgT); return; }
      if (msgEl) msgEl.textContent = msgs[mi];
    }, 520);
  }
  // Onboarding — name input
  const nameIn = $('nameInput');
  if (nameIn) {
    nameIn.addEventListener('input', e => {
      S.onboard.name = e.target.value;
      const btn = $('ob-next'); if (btn) btn.disabled = !e.target.value.trim();
    });
    nameIn.focus();
  }
  // Onboarding — numeric inputs
  [['ob-age','age'],['ob-height','height'],['ob-weight','weight'],['ob-target-weight','targetWeight']].forEach(([id,field])=>{
    const el = $(id);
    if (el) el.addEventListener('input', e => {
      S.onboard[field] = parseFloat(e.target.value) || '';
      const btn = $('ob-next');
      if (btn) {
        if (field==='age') btn.disabled = !(S.onboard.age>=13 && S.onboard.age<=99);
        else if (field==='height') btn.disabled = !(S.onboard.height>=100 && S.onboard.height<=250);
        else if (field==='weight') btn.disabled = !(S.onboard.weight>=30 && S.onboard.weight<=300);
        else btn.disabled = false;
      }
      if (field==='targetWeight') render(); // update diff display
    });
  });
  // Onboarding — single-select (auto-advance)
  document.querySelectorAll('[data-ob-single]').forEach(el => {
    el.addEventListener('click', () => {
      S.onboard[el.dataset.obSingle] = el.dataset.obVal;
      // day/duration use numeric keys too — convert if needed
      if (el.dataset.obSingle === 'days') S.onboard.days = parseInt(el.dataset.obVal);
      setTimeout(() => { S.onboard.step++; render(); }, 180);
    });
  });
  // Onboarding — multi-select
  document.querySelectorAll('[data-ob-multi]').forEach(el => {
    el.addEventListener('click', () => {
      const field = el.dataset.obMulti;
      const val = el.dataset.obVal;
      if (val === 'none' || val === 'full') { S.onboard[field] = [val]; }
      else {
        const arr = S.onboard[field];
        arr.includes('none') && arr.splice(arr.indexOf('none'),1);
        arr.includes('full') && arr.splice(arr.indexOf('full'),1);
        const idx = arr.indexOf(val);
        if (idx > -1) arr.splice(idx, 1); else arr.push(val);
      }
      render();
    });
  });
  // Onboarding — equipment chips
  document.querySelectorAll('[data-equip]').forEach(el => {
    el.addEventListener('click', () => {
      const v = el.dataset.equip;
      const idx = S.onboard.equip.indexOf(v);
      if (idx > -1) S.onboard.equip.splice(idx, 1); else S.onboard.equip.push(v);
      render();
    });
  });
  // Onboarding — next / back
  const obNext = $('ob-next');
  if (obNext) obNext.addEventListener('click', () => { S.onboard.step++; render(); });
  const obBack = $('ob-back');
  if (obBack) obBack.addEventListener('click', () => { S.onboard.step--; render(); });
  // Onboarding — finish
  const obFinish = $('ob-finish');
  if (obFinish) obFinish.addEventListener('click', () => {
    const o = S.onboard;
    S.user = { name: o.name, goal: o.goal, goalDetail: o.goalDetail, gender: o.gender, age: o.age, height: o.height, weight: o.weight, targetWeight: o.targetWeight, activityLevel: o.activityLevel, level: o.level, days: o.days, timeOfDay: o.timeOfDay, duration: o.duration, equip: o.equip, location: o.location, injuries: o.injuries, focusAreas: o.focusAreas, diet: o.diet, sleep: o.sleep, motivation: o.motivation, challenge: o.challenge };
    saveUser();
    S.screen = 'main';
    render();
  });

  // Nav tabs
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.tab !== 'scanner') stopCamera();
      S.tab = el.dataset.tab;
      S.exploreFilter = 'all';
      S.searchQ = '';
      render();
    });
  });

  // Explore tabs
  document.querySelectorAll('[data-et]').forEach(el => {
    el.addEventListener('click', () => {
      S.exploreTab = el.dataset.et;
      S.exploreFilter = 'all';
      S.exploreLimit = 60;
      render();
    });
  });

  // Filters
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('click', () => {
      S.exploreFilter = el.dataset.filter;
      S.exploreLimit = 60;
      render();
    });
  });

  // Load more
  const loadMoreBtn = $('load-more-btn');
  if (loadMoreBtn) {
    loadMoreBtn.addEventListener('click', () => {
      S.exploreLimit = (S.exploreLimit || 60) + 60;
      render();
    });
  }

  // Search
  const searchIn = $('searchInput');
  if (searchIn) {
    searchIn.addEventListener('input', e => {
      S.searchQ = e.target.value;
      S.exploreLimit = 60;
      render();
    });
  }

  // Start workout / open detail
  document.querySelectorAll('.start-workout-btn').forEach(el => {
    el.addEventListener('click', () => {
      // Try WORKOUTS first (featured), then LIBO_WORKOUTS (full library)
      let w = WORKOUTS.find(w => w.id === el.dataset.id);
      if (!w && typeof LIBO_WORKOUTS !== 'undefined') {
        const lw = LIBO_WORKOUTS.find(w => w.id === el.dataset.id || w.slug === el.dataset.id);
        if (lw) {
          // Adapt LIBO_WORKOUT to app format
          const mainExs = (lw.main || []).slice(0, 8);
          w = {
            id: lw.id || lw.slug,
            name: lw.name,
            cat: lw.cat,
            diff: lw.diff || lw.difficulty || 'beginner',
            dur: lw.dur || parseInt(lw.duration) || 30,
            equip: 'Various',
            emoji: lw.emoji || '🏋️',
            goal: 'general',
            exercises: mainExs.map(ex => {
              const found = findExByName(ex.exercise);
              return {
                id: found ? found.id : ex.exercise.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''),
                name: ex.exercise,
                sets: parseInt(ex.sets) || 3,
                reps: ex.reps || '10',
                _ex: found,
              };
            }),
          };
        }
      }
      if (!w) return;
      S.selectedWorkout = w;
      if (w.cat === 'Challenge') {
        S.screen = 'challenge';
      } else {
        S.screen = 'workout-detail';
      }
      render();
    });
  });

  // Challenge day start
  const startChallDay = $('start-challenge-day-btn');
  if (startChallDay) {
    startChallDay.addEventListener('click', () => {
      S.screen = 'player';
      S.player = { exerciseIndex: 0, phase: 'playing', logModal: false, sets: [], completedSets: [] };
      render();
    });
  }
  // Mark challenge day done (without playing)
  const markDone = $('mark-done-btn');
  if (markDone) {
    markDone.addEventListener('click', () => {
      const cid = S.selectedWorkout.id;
      if (!S.challengeProgress[cid]) S.challengeProgress[cid] = { startDate: new Date().toISOString(), completedDays: [] };
      const day = S.challengeProgress[cid].completedDays.length + 1;
      if (!S.challengeProgress[cid].completedDays.includes(day)) {
        S.challengeProgress[cid].completedDays.push(day);
        localStorage.setItem('libo_challenge_progress', JSON.stringify(S.challengeProgress));
      }
      render();
    });
  }

  // Open builder / AI gen
  const openBuilder = $('open-builder-btn');
  if (openBuilder) openBuilder.addEventListener('click', () => {
    S.builder = { step: 'pick', name: 'My Workout', exercises: [], searchQ: '', filter: 'All' };
    S.screen = 'custom-builder';
    render();
  });
  const openAi = $('open-ai-btn');
  if (openAi) openAi.addEventListener('click', () => {
    S.aiGen = { step: 'form', goal: S.user?.goal||'', equip: 'none', duration: 30, focus: 'Full Body', generated: null };
    S.screen = 'ai-gen';
    render();
  });

  // Custom workout cards in Programs list
  document.querySelectorAll('[data-custom-id]').forEach(el => {
    el.addEventListener('click', () => {
      const w = (S.customWorkouts||[]).find(w => w.id === el.dataset.customId);
      if (!w) return;
      S.selectedWorkout = w;
      S.screen = 'workout-detail';
      render();
    });
  });

  // Builder — search
  const bSearch = $('builder-search');
  if (bSearch) {
    bSearch.addEventListener('input', e => { S.builder.searchQ = e.target.value; render(); });
  }
  // Builder — filter chips
  document.querySelectorAll('[data-bfilter]').forEach(el => {
    el.addEventListener('click', () => { S.builder.filter = el.dataset.bfilter; render(); });
  });
  // Builder — add exercise buttons
  document.querySelectorAll('[data-add-ex]').forEach(el => {
    el.addEventListener('click', () => {
      const ex = EXERCISES.find(e => e.id === el.dataset.addEx);
      if (!ex) return;
      const idx = S.builder.exercises.findIndex(e => e.id === ex.id);
      if (idx > -1) { S.builder.exercises.splice(idx, 1); }
      else { S.builder.exercises.push({ id: ex.id, name: ex.name, emoji: ex.emoji, sets: 3, reps: '10', _ex: ex }); }
      render();
    });
  });
  // Builder — go to configure
  const bConfigBtn = $('builder-configure-btn');
  if (bConfigBtn) bConfigBtn.addEventListener('click', () => { S.builder.step = 'configure'; render(); });
  // Builder — add more from configure step
  const bAddMore = $('builder-add-more-btn');
  if (bAddMore) bAddMore.addEventListener('click', () => { S.builder.step = 'pick'; render(); });
  // Builder — name input
  const bNameIn = $('builder-name-input');
  if (bNameIn) bNameIn.addEventListener('input', e => { S.builder.name = e.target.value; });
  // Builder — sets/reps inputs
  document.querySelectorAll('.reps-input').forEach(el => {
    el.addEventListener('change', e => {
      const idx = parseInt(el.dataset.idx);
      const field = el.dataset.field;
      if (!isNaN(idx) && field) {
        S.builder.exercises[idx][field] = field === 'sets' ? parseInt(e.target.value)||1 : e.target.value;
      }
    });
  });
  // Builder — remove exercise
  document.querySelectorAll('[data-remove]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.remove);
      if (!isNaN(idx)) { S.builder.exercises.splice(idx, 1); render(); }
    });
  });
  // Builder — save
  const bSaveBtn = $('builder-save-btn');
  if (bSaveBtn) bSaveBtn.addEventListener('click', () => {
    const name = $('builder-name-input')?.value || S.builder.name;
    const w = { id: 'custom_' + Date.now(), name: name||'My Workout', cat: 'Home', diff: 'intermediate', dur: Math.max(10, S.builder.exercises.length * 3), equip: 'none', emoji: '✏️', goal: 'general', exercises: [...S.builder.exercises] };
    S.customWorkouts = [w, ...(S.customWorkouts||[])];
    localStorage.setItem('libo_custom_workouts', JSON.stringify(S.customWorkouts));
    S.screen = 'main'; S.tab = 'programs'; render();
  });
  // Builder — save & start
  const bStartBtn = $('builder-start-btn');
  if (bStartBtn) bStartBtn.addEventListener('click', () => {
    const name = $('builder-name-input')?.value || S.builder.name;
    const w = { id: 'custom_' + Date.now(), name: name||'My Workout', cat: 'Home', diff: 'intermediate', dur: Math.max(10, S.builder.exercises.length * 3), equip: 'none', emoji: '✏️', goal: 'general', exercises: [...S.builder.exercises] };
    S.customWorkouts = [w, ...(S.customWorkouts||[])];
    localStorage.setItem('libo_custom_workouts', JSON.stringify(S.customWorkouts));
    S.selectedWorkout = w;
    S.screen = 'player';
    S.player = { exerciseIndex: 0, logModal: false, sets: [], completedSets: [] };
    render();
  });

  // AI — goal chips
  document.querySelectorAll('[data-ai-goal]').forEach(el => {
    el.addEventListener('click', () => { S.aiGen.goal = el.dataset.aiGoal; render(); });
  });
  // AI — equip chips
  document.querySelectorAll('[data-ai-equip]').forEach(el => {
    el.addEventListener('click', () => { S.aiGen.equip = el.dataset.aiEquip; render(); });
  });
  // AI — duration chips
  document.querySelectorAll('[data-ai-dur]').forEach(el => {
    el.addEventListener('click', () => { S.aiGen.duration = parseInt(el.dataset.aiDur); render(); });
  });
  // AI — focus chips
  document.querySelectorAll('[data-ai-focus]').forEach(el => {
    el.addEventListener('click', () => { S.aiGen.focus = el.dataset.aiFocus; render(); });
  });
  // AI — generate
  const aiGenBtn = $('ai-generate-btn');
  if (aiGenBtn) aiGenBtn.addEventListener('click', () => {
    S.aiGen.generated = generateWorkout(S.aiGen.goal, S.aiGen.equip, S.aiGen.duration, S.aiGen.focus);
    S.aiGen.step = 'result';
    render();
  });
  // AI — regenerate
  const aiRegenBtn = $('ai-regen-btn');
  if (aiRegenBtn) aiRegenBtn.addEventListener('click', () => {
    const g = S.aiGen;
    S.aiGen.generated = generateWorkout(g.goal + (S.aiGen._regenCount = ((S.aiGen._regenCount||0)+1)), g.equip, g.duration, g.focus);
    render();
  });
  // AI — save
  const aiSaveBtn = $('ai-save-btn');
  if (aiSaveBtn) aiSaveBtn.addEventListener('click', () => {
    const w = S.aiGen.generated;
    if (!w) return;
    S.customWorkouts = [w, ...(S.customWorkouts||[])];
    localStorage.setItem('libo_custom_workouts', JSON.stringify(S.customWorkouts));
    S.screen = 'main'; S.tab = 'programs'; render();
  });
  // AI — start
  const aiStartBtn = $('ai-start-btn');
  if (aiStartBtn) aiStartBtn.addEventListener('click', () => {
    const w = S.aiGen.generated;
    if (!w) return;
    S.selectedWorkout = w;
    S.screen = 'player';
    S.player = { exerciseIndex: 0, logModal: false, sets: [], completedSets: [] };
    render();
  });

  // Exercise detail modal
  document.querySelectorAll('[data-exid]').forEach(el => {
    el.addEventListener('click', () => {
      const ex = EXERCISES.find(e => e.id === el.dataset.exid);
      if (!ex) return;
      showExerciseModal(ex);
    });
  });

  // Back button
  const backBtn = $('back-btn');
  if (backBtn) backBtn.addEventListener('click', () => {
    S.screen = 'main';
    render();
  });

  // Start player
  const startPlayer = $('start-player-btn');
  if (startPlayer) startPlayer.addEventListener('click', () => {
    S.screen = 'player';
    S.player = { exerciseIndex: 0, logModal: false, sets: [], completedSets: [] };
    render();
  });

  // Player next/log
  const logBtn = $('log-btn');
  if (logBtn) logBtn.addEventListener('click', () => {
    S.player.logModal = true;
    render();
  });

  const prevBtn = $('prev-ex');
  if (prevBtn) prevBtn.addEventListener('click', () => {
    if (S.player.exerciseIndex > 0) {
      S.player.exerciseIndex--;
      S.player.logModal = false;
      render();
    }
  });

  const saveLogBtn = $('save-log-btn');
  if (saveLogBtn) saveLogBtn.addEventListener('click', () => {
    const w = S.selectedWorkout;
    S.player.logModal = false;
    if (S.player.exerciseIndex < w.exercises.length - 1) {
      S.player.exerciseIndex++;
      render();
    } else {
      saveLog(w.id);
      // If it was a challenge workout, mark the day complete
      if (S.selectedWorkout && S.selectedWorkout.cat === 'Challenge') {
        const cid = S.selectedWorkout.id;
        if (!S.challengeProgress[cid]) S.challengeProgress[cid] = { startDate: new Date().toISOString(), completedDays: [] };
        const day = (S.challengeProgress[cid].completedDays.length || 0) + 1;
        if (!S.challengeProgress[cid].completedDays.includes(day)) {
          S.challengeProgress[cid].completedDays.push(day);
          localStorage.setItem('libo_challenge_progress', JSON.stringify(S.challengeProgress));
        }
      }
      S.screen = 'complete';
      render();
    }
  });

  const exitPlayer = $('exit-player');
  if (exitPlayer) exitPlayer.addEventListener('click', () => {
    S.screen = 'main';
    render();
  });

  // Modal close on overlay
  const overlay = $('modal-overlay');
  if (overlay) overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      S.player.logModal = false;
      render();
    }
  });

  // Scanner mode toggle
  document.querySelectorAll('[data-smode]').forEach(el => {
    el.addEventListener('click', () => {
      stopCamera();
      S.scannerMode = el.dataset.smode;
      S.scannerState = 'idle';
      S.scannerResult = null;
      S.scannerError = '';
      render();
    });
  });

  // Camera scan button
  const scanBtn = $('scan-btn');
  if (scanBtn) scanBtn.addEventListener('click', () => { handleScan(); });

  // Scan again
  const scanAgain = $('scan-again-btn');
  if (scanAgain) scanAgain.addEventListener('click', () => {
    S.scannerState = 'idle';
    S.scannerResult = null;
    render();
  });

  // API key save
  const apiKeySave = $('api-key-save');
  if (apiKeySave) apiKeySave.addEventListener('click', () => {
    const val = $('api-key-input')?.value?.trim();
    if (val) {
      S.scannerApiKey = val;
      localStorage.setItem('libo_api_key', val);
      render();
    }
  });

  // Manual scanner dropdown
  const scannerSel = $('scannerSelect');
  if (scannerSel) scannerSel.addEventListener('change', e => {
    S.scannerEx = e.target.value;
    render();
  });

  // Initialize camera when in camera mode on scanner tab
  if (S.tab === 'scanner' && (S.scannerMode || 'camera') === 'camera' && S.screen === 'main') {
    setTimeout(() => startCamera(), 50);
  }

  // Water tracker
  function saveWater(n) {
    S.waterCount = Math.max(0, Math.min(20, n));
    localStorage.setItem('libo_water_' + new Date().toDateString(), S.waterCount);
    render();
  }
  const wPlus = $('water-plus');
  if (wPlus) wPlus.addEventListener('click', () => saveWater(S.waterCount + 1));
  const wMinus = $('water-minus');
  if (wMinus) wMinus.addEventListener('click', () => saveWater(S.waterCount - 1));
  document.querySelectorAll('[data-glass]').forEach(el => {
    el.addEventListener('click', () => saveWater(parseInt(el.dataset.glass)));
  });

  // Complete
  const backHome = $('back-home-btn');
  if (backHome) backHome.addEventListener('click', () => {
    if (S.selectedWorkout?.cat === 'Challenge') {
      S.screen = 'challenge';
    } else {
      S.screen = 'main';
      S.tab = 'home';
    }
    render();
  });

  const viewProg = $('view-progress-btn');
  if (viewProg) viewProg.addEventListener('click', () => {
    S.screen = 'main';
    S.tab = 'progress';
    render();
  });
}

// Exercise modal
function showExerciseModal(ex) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'ex-modal';
  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div style="font-size:48px;text-align:center;margin-bottom:12px">${ex.emoji}</div>
      <div class="modal-title" style="text-align:center">${ex.name}</div>
      <div style="text-align:center;margin-bottom:16px">
        <span class="diff-badge diff-${ex.diff}" style="display:inline-block">${ex.diff}</span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        ${ex.muscles.map(m=>`<span style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600">${m}</span>`).join('')}
      </div>
      <div class="section-label" style="margin-bottom:10px">How to do it</div>
      ${ex.instructions.map((step,i)=>`
        <div class="instruction-item">
          <div class="inst-num">${i+1}</div>
          <div class="inst-text">${step}</div>
        </div>`).join('')}
      <button class="btn-full" style="margin-top:20px" id="close-ex-modal">Got it ✓</button>
    </div>`;
  document.getElementById('app').appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal || e.target.id === 'close-ex-modal') modal.remove(); });
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
render();
</script>
</body>
</html>
